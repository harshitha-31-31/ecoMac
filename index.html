<title>Eco App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f4f4;
}

header {
    background: green;
    color: white;
    text-align: center;
    padding: 15px;
}

.section {
    display: none;
    padding: 20px;
    padding-bottom: 70px;
}

.active {
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    padding: 10px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

#chatBox {
    height: 250px;
    overflow-y: auto;
    background: #fff;
    padding: 10px;
    border: 1px solid #ccc;
}

.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: #222;
}

.navbar button {
    flex: 1;
    background: none;
    color: white;
}

.navbar button:hover {
    background: green;
}
</style>
</head>

<body>

<header>🌱 Eco App</header>

<div id="home" class="section active">
    <h2>Home</h2>
    <p>Welcome to Eco App 🌍</p>
</div>

<!-- INPUT -->
<input type="text" id="userInput" placeholder="Type or speak...">

<!-- BUTTONS -->
<button onclick="sendMessage()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
  
<div id="profile" class="section">
    <h2>Profile</h2>
    <p>Name: User</p>
</div>

<div class="navbar">
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('chat')">Chat</button>
    
    <button onclick="showSection('profile')">Profile</button>
</div>

<script>

// Navigation
function showSection(id) {
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Send Message
function sendMessage() {
    let inputBox = document.getElementById("userInput");
    let chatBox = document.getElementById("chatBox");

    let text = inputBox.value.trim();
    if (text === "") return;

    chatBox.innerHTML += "<p><b>You:</b> " + text + "</p>";

    let reply = generateResponse(text);

    chatBox.innerHTML += "<p><b>EcoBot:</b> " + reply + "</p>";

    inputBox.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
