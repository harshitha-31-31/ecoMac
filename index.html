<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Eco App</title>

<style>
/* CSS Reset & Variables */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --primary: #2E7D32;
    --primary-light: #4CAF50;
    --primary-dark: #1B5E20;
    --accent: #81C784;
    --bg: #F5F7FA;
    --card: #FFFFFF;
    --text: #263238;
    --text-light: #78909C;
    --border: #ECEFF1;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
}

html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
}

/* Header */
header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    z-index: 100;
    box-shadow: var(--shadow-lg);
}

header::before {
    content: "🌿";
    margin-right: 8px;
    font-size: 20px;
}

/* Main Content */
main {
    height: 100%;
    padding-top: 56px;
    padding-bottom: 64px;
    overflow: hidden;
}

.section {
    display: none;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    animation: fadeIn 0.3s ease;
}

.section.active {
    display: flex;
    flex-direction: column;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Home Section */
.home-content {
    text-align: center;
    padding: 40px 20px;
}

.home-icon {
    font-size: 80px;
    margin-bottom: 20px;
}

.home-content h2 {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 12px;
}

.home-content p {
    font-size: 16px;
    color: var(--text-light);
    line-height: 1.6;
    max-width: 280px;
    margin: 0 auto 32px;
}

.features {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    max-width: 320px;
    margin: 0 auto;
}

.feature-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 12px;
    box-shadow: var(--shadow);
    text-align: center;
    transition: transform 0.2s;
}

.feature-card:active {
    transform: scale(0.98);
}

.feature-card .icon {
    font-size: 32px;
    margin-bottom: 8px;
}

.feature-card span {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
}

/* Chat Section */
#chat {
    padding: 0;
    background: var(--bg);
}

.chat-container {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.welcome-message {
    text-align: center;
    padding: 20px;
    color: var(--text-light);
    font-size: 14px;
}

.welcome-message .icon {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
}

/* Chat Bubbles */
.message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 15px;
    line-height: 1.5;
    animation: slideIn 0.3s ease;
    word-wrap: break-word;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.message.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border-bottom-right-radius: 4px;
}

.message.bot {
    align-self: flex-start;
    background: var(--card);
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
}

.message.bot .icon-row {
    display: flex;
    align-items: center;
    margin: 6px 0;
    font-size: 14px;
}

.message.bot .icon-row span:first-child {
    margin-right: 8px;
    font-size: 16px;
}

/* Input Area */
.input-area {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 12px 16px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
}

.input-wrapper {
    flex: 1;
    position: relative;
}

input {
    width: 100%;
    height: 44px;
    padding: 0 16px;
    border: 1px solid var(--border);
    border-radius: 22px;
    font-size: 15px;
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus {
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
}

.btn-icon {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.2s;
}

.btn-icon:active {
    transform: scale(0.92);
}

.btn-icon.voice {
    background: var(--accent);
    color: var(--primary-dark);
}

/* Profile Section */
.profile-header {
    text-align: center;
    padding: 24px;
    background: var(--card);
    border-radius: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
}

.avatar {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--primary-light) 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 16px;
}

.profile-header h3 {
    font-size: 20px;
    font-weight: 600;
}

.profile-header p {
    color: var(--text-light);
    font-size: 14px;
    margin-top: 4px;
}

.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.stat-card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
}

.stat-card .number {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary);
}

.stat-card .label {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
}

/* Navbar */
.navbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 100;
}

.nav-btn {
    flex: 1;
    height: 100%;
    border: none;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: color 0.2s;
    color: var(--text-light);
    font-size: 12px;
}

.nav-btn .nav-icon {
    font-size: 22px;
}

.nav-btn.active,
.nav-btn:hover {
    color: var(--primary);
}

/* Scrollbar styling */
::-webkit-scrollbar {
    width: 4px;
}

::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 2px;
}

/* Utility */
.hidden {
    display: none !important;
}
</style>
</head>

<body>

<header>Eco App</header>

<main>
    <!-- HOME SECTION -->
    <div id="home" class="section active">
        <div class="home-content">
            <div class="home-icon">🌍</div>
            <h2>Eco App</h2>
            <p>Your personal guide to sustainable waste management and recycling</p>

            <div class="features">
                <div class="feature-card">
                    <div class="icon">♻️</div>
                    <span>Recycle Guide</span>
                </div>
                <div class="feature-card">
                    <div class="icon">🎤</div>
                    <span>Voice Input</span>
                </div>
                <div class="feature-card">
                    <div class="icon">📊</div>
                    <span>Track Impact</span>
                </div>
                <div class="feature-card">
                    <div class="icon">💡</div>
                    <span>Eco Tips</span>
                </div>
            </div>
        </div>
    </div>

    <!-- CHAT SECTION -->
    <div id="chat" class="section">
        <div class="chat-container" id="chatBox">
            <div class="welcome-message">
                <span class="icon">🌱</span>
                <p>Ask me about any waste item!<br>Example: "plastic bottle", "food waste"</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Type a message...">
            </div>
            <button class="btn-icon voice" onclick="startVoice()" title="Voice input">🎤</button>
            <button class="btn-icon" onclick="sendMessage()" title="Send">➤</button>
        </div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profile" class="section">
        <div class="profile-header">
            <div class="avatar">👤</div>
            <h3>Eco User</h3>
            <p>Joined 2024</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">Queries</div>
            </div>
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">Items</div>
            </div>
            <div class="stat-card">
                <div class="number">0</div>
                <div class="label">Streak</div>
            </div>
        </div>
    </div>
</main>

<!-- NAVBAR -->
<div class="navbar">
    <button class="nav-btn active" onclick="showSection('home')">
        <span class="nav-icon">🏠</span>
        <span>Home</span>
    </button>
    <button class="nav-btn" onclick="showSection('chat')">
        <span class="nav-icon">💬</span>
        <span>Chat</span>
    </button>
    <button class="nav-btn" onclick="showSection('profile')">
        <span class="nav-icon">👤</span>
        <span>Profile</span>
    </button>

<script>

// Navigation
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

// Send Message
function sendMessage() {
    let inputBox = document.getElementById("userInput");
    let chatBox = document.getElementById("chatBox");

    let text = inputBox.value.trim();
    if (text === "") return;

    // Add user message
    let userMsg = document.createElement('div');
    userMsg.className = 'message user';
    userMsg.textContent = text;
    chatBox.appendChild(userMsg);

    // Get and add bot response
    let reply = generateResponse(text);
    let botMsg = document.createElement('div');
    botMsg.className = 'message bot';
    botMsg.innerHTML = reply;
    chatBox.appendChild(botMsg);

    inputBox.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
